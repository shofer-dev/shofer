# 05 — source-clip audio + final-mix audio filters.
#       Uses demo-orig.webm (the previous render, which HAS an audio track).
# Run:  python3 ../build-video.py 05-audio.yaml
output: 05-audio.webm
clips_dir: ../../../media
canvas: { width: 1280, height: 720, fps: 30 }
voice: { enabled: false } # we use the clip's own audio, not TTS
pacing: { enabled: false }
audio:
    use_source: true # mix each clip's own audio
    source_volume: 1.0
    loudnorm: true # EBU R128 normalize the final mix
    bass: 2 # +2 dB low shelf
    compress: true # gentle bus compression
transition: { type: fade, duration: 0.5 } # audio crossfades across the overlap
clips:
    - { file: demo-orig.webm, trim: [0, 6], title: "Source audio + loudnorm", audio_fade: { in: 0.5 } }
    - { file: demo-orig.webm, trim: [20, 26], title: "Crossfade + bass + compress", audio_fade: { out: 0.5 } }
