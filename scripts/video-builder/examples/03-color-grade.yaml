# 03 — colour grading & stabilization
# Run:  python3 ../build-video.py 03-color-grade.yaml
output: 03-color-grade.webm
clips_dir: ../../../media
canvas: { width: 1280, height: 720, fps: 30 }
voice: { enabled: false }
pacing: { enabled: false }
transition: { type: fade, duration: 0.4 }
clips:
    - { file: screencast-final.webm, trim: [0, 3], title: "Original" }
    - file: screencast-final.webm
      trim: [0, 3]
      title: "Warm white balance + punch"
      effects:
          - { type: white_balance, temperature: 4800 }
          - { type: eq, contrast: 1.1, saturation: 1.15 }
    - file: screencast-final.webm
      trim: [0, 3]
      title: "3-way colour wheels + curve"
      effects:
          - { type: colorbalance, shadows: [0.10, 0, -0.10], highs: [-0.05, 0, 0.08] }
          - { type: curves, preset: lighter }
    - file: screencast-final.webm
      trim: [20, 24]
      title: "Stabilized (vidstab)"
      effects: [{ type: stabilize, smoothing: 20 }]
