# 02 — effects gallery: one effect per clip (upper title names it)
# Run:  python3 ../build-video.py 02-effects.yaml
output: 02-effects.webm
clips_dir: ../../../media
canvas: { width: 1280, height: 720, fps: 30 }
voice: { enabled: false }
pacing: { enabled: false }
transition: { type: dissolve, duration: 0.4 }
title: { position: upper }
clips:
    - { file: screencast-final.webm, trim: [2, 4], title: "blur", effects: [{ type: blur, sigma: 8 }] }
    - { file: screencast-final.webm, trim: [4, 6], title: "glow", effects: [{ type: glow, sigma: 14 }] }
    - { file: screencast-final.webm, trim: [6, 8], title: "sepia", effects: [{ type: sepia }] }
    - { file: screencast-final.webm, trim: [8, 10], title: "vignette", effects: [{ type: vignette }] }
    - { file: screencast-final.webm, trim: [10, 12], title: "sketch", effects: [{ type: sketch }] }
    - { file: screencast-final.webm, trim: [12, 14], title: "oldfilm", effects: [{ type: oldfilm }] }
    - { file: screencast-final.webm, trim: [14, 16], title: "pixelate", effects: [{ type: pixelate, size: 24 }] }
    - { file: screencast-final.webm, trim: [16, 18], title: "negate", effects: [{ type: negate }] }
    - { file: screencast-final.webm, trim: [18, 20], title: "ken burns zoom", effects: [{ type: zoom, from: 1.0, to: 1.15 }] }
